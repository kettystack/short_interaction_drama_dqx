name: sdi_flutter
description: 短剧即时互动 · Flutter 客户端（参考 Kazumi 设计）
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.4 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # —— 架构 ——
  flutter_modular: ^6.3.4         # 路由 + DI（同 Kazumi）
  provider: ^6.1.2                # 状态分发
  mobx: ^2.6.0
  flutter_mobx: ^2.3.0

  # —— 网络 ——
  dio: ^5.7.0
  cookie_jar: ^4.0.9
  dio_cookie_manager: ^3.1.1
  web_socket_channel: ^3.0.1

  # —— 本地存储 ——
  hive_ce: ^2.16.0                # 同 Kazumi
  hive_ce_flutter: ^2.3.3
  path_provider: ^2.1.5

  # —— 视频播放（核心，跨平台 mpv 内核） ——
  media_kit: ^1.1.11
  media_kit_video: ^1.3.0
  media_kit_libs_video: ^1.0.5

  # —— 弹幕引擎（Kazumi 同款） ——
  canvas_danmaku: ^0.3.1

  # —— UI ——
  cached_network_image: ^3.4.1
  dynamic_color: ^1.8.1
  skeletonizer: ^2.1.2            # 骨架屏（同 Kazumi）
  flutter_svg: ^2.0.16
  carousel_slider: ^5.0.0         # 首页 Banner 自动轮播
  audio_video_progress_bar: ^2.0.2
  lottie: ^3.3.1

  # —— 手势 / 设备控制 ——
  flutter_volume_controller: ^2.0.0
  screen_brightness: ^2.1.0

  # —— 工具 ——
  collection: ^1.18.0
  logger: ^2.6.2
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  mobx_codegen: ^2.6.0
  hive_ce_generator: ^1.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/lottie/highlight/
